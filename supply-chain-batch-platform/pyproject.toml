# Repo-level tooling config (formatting, linting, typing, tests).
# The installable library lives in common/ (package: scb_common).

[tool.black]
line-length = 100
target-version = ["py311"]

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["common", "data_generators", "ingestion", "spark", "airflow", "scripts"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "C4", "SIM", "RUF"]
ignore = ["E501"]  # black owns line length

[tool.mypy]
python_version = "3.11"
warn_redundant_casts = true
check_untyped_defs = true
ignore_missing_imports = true
files = ["common/scb_common"]

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["common/tests", "data_generators/tests", "ingestion/tests", "spark/tests", "airflow/tests", "tests"]
pythonpath = ["common", ".", "airflow/dags"]
