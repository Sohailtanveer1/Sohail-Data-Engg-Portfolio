name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Lint, type-check & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e common
      - name: Format (black)
        run: black --check .
      - name: Lint (ruff)
        run: ruff check .
      - name: Type-check (mypy)
        run: mypy
      - name: Tests (pytest)
        run: pytest -q

  terraform:
    name: Terraform validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        root:
          - infra/terraform/bootstrap
          - infra/terraform/environments/dev
          - infra/terraform/environments/uat
          - infra/terraform/environments/prod
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
      - name: Format check (whole tree, once)
        if: matrix.root == 'infra/terraform/bootstrap'
        run: terraform fmt -check -recursive infra/terraform
      - name: Init (no backend)
        run: terraform -chdir=${{ matrix.root }} init -backend=false -input=false
      - name: Validate
        run: terraform -chdir=${{ matrix.root }} validate

  dags:
    name: Airflow DAG validation
    runs-on: ubuntu-latest
    env:
      AIRFLOW_VERSION: "2.9.3"
      PY: "3.11"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install Airflow (constrained) + repo deps
        run: |
          python -m pip install --upgrade pip
          CONSTRAINTS="https://raw.githubusercontent.com/apache/airflow/constraints-${AIRFLOW_VERSION}/constraints-${PY}.txt"
          pip install "apache-airflow==${AIRFLOW_VERSION}" \
            "apache-airflow-providers-google" --constraint "${CONSTRAINTS}"
          pip install -e common pandas pyarrow openpyxl pyyaml
      - name: Import & validate DAGs
        env:
          PYTHONPATH: airflow/dags:airflow/plugins:.
        run: |
          python - <<'PY'
          from airflow.models.dagbag import DagBag
          bag = DagBag("airflow/dags", include_examples=False)
          assert not bag.import_errors, bag.import_errors
          print("DAGs OK:", list(bag.dags))
          PY
